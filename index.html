<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Power Supply - Hard Mode</title>

<style>
    body {
        margin: 0;
        background: #000;
        overflow: hidden;
        font-family: 'Segoe UI', Arial, sans-serif;
        user-select: none;
        -webkit-user-select: none;
    }

    canvas {
        display: block;
        touch-action: none;
    }

    #timer {
        position: fixed;
        top: 20px;
        left: 50%;
        transform: translateX(-50%);
        color: #0f0;
        font-size: 32px;
        font-weight: bold;
        text-shadow: 0 0 10px #0f0;
        z-index: 5;
    }

    #overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.95);
        color: white;
        display: none;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
        z-index: 10;
    }

    #overlay h1 { font-size: 40px; color: red; margin: 0; }
</style>
</head>

<body>

<div id="timer">60</div>
<canvas id="c"></canvas>

<div id="overlay">
    <h1>GÜÇ KESİLDİ</h1>
    <p>Sistemi Resetlemek İçin Çift Tıklayın</p>
</div>

<audio id="connectSound">
    <source src="https://www.soundjay.com/buttons/sounds/button-09.mp3">
</audio>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");
const overlay = document.getElementById("overlay");
const timerEl = document.getElementById("timer");
const connectSound = document.getElementById("connectSound");

let left = [], right = [], connections = [null, null, null, null];
let selected = null;
let isDragging = false;
let currentPos = { x: 0, y: 0 };
const colors = ["#ff4d4d", "#4d94ff", "#4dff4d", "#ffff4d"];

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    generate();
}

function generate() {
    left = [];
    right = [];
    const padding = canvas.height / 6;
    for(let i=0; i<4; i++) {
        left.push({ x: canvas.width * 0.15, y: padding + i * padding, color: colors[i] });
        right.push({ x: canvas.width * 0.85, y: padding + i * padding, color: colors[i] });
    }
    right.sort(() => Math.random() - 0.5);
}

function getPointerPos(e) {
    const rect = canvas.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    return { x: clientX - rect.left, y: clientY - rect.top };
}

function startAction(e) {
    const pos = getPointerPos(e);
    left.forEach((p, i) => {
        if (Math.hypot(pos.x - p.x, pos.y - p.y) < 35) {
            selected = i;
            isDragging = true;
            currentPos = pos;
        }
    });
}

function moveAction(e) {
    if (isDragging) currentPos = getPointerPos(e);
}

function endAction(e) {
    if (!isDragging) return;
    
    let foundMatch = false;
    right.forEach((p, i) => {
        if (Math.hypot(currentPos.x - p.x, currentPos.y - p.y) < 45) {
            foundMatch = true;
            // ANLIK KONTROL: Eğer renkler tutmuyorsa patlat!
            if (left[selected].color !== p.color) {
                failEffect();
                connections = [null, null, null, null];
                generate();
            } else {
                connections[selected] = i;
                connectSound.currentTime = 0;
                connectSound.play().catch(() => {});
                checkWin();
            }
        }
    });

    isDragging = false;
    selected = null;
}

// Yanlış yapınca kırmızı ekran flaşı
function failEffect() {
    ctx.fillStyle = "rgba(255, 0, 0, 0.5)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
}

function checkWin() {
    if (connections.every(c => c !== null)) {
        setTimeout(() => {
            alert("⚡ TAMAMLANDI!");
            resetGame();
        }, 100);
    }
}

function draw() {
    ctx.fillStyle = "#000";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Mevcut bağlantılar
    connections.forEach((rIdx, lIdx) => {
        if (rIdx !== null) {
            ctx.strokeStyle = left[lIdx].color;
            ctx.lineWidth = 6;
            ctx.beginPath();
            ctx.moveTo(left[lIdx].x, left[lIdx].y);
            ctx.lineTo(right[rIdx].x, right[rIdx].y);
            ctx.stroke();
        }
    });

    // Aktif sürükleme
    if (isDragging && selected !== null) {
        ctx.strokeStyle = left[selected].color;
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.moveTo(left[selected].x, left[selected].y);
        ctx.lineTo(currentPos.x, currentPos.y);
        ctx.stroke();
    }

    // Soketler
    [...left, ...right].forEach(p => {
        ctx.shadowBlur = 10;
        ctx.shadowColor = p.color;
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, 15, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;
    });

    requestAnimationFrame(draw);
}

let time = 60;
let timerInterval;
function startTimer() {
    time = 60;
    timerInterval = setInterval(() => {
        time--;
        timerEl.textContent = time;
        if(time <= 0) { clearInterval(timerInterval); overlay.style.display="flex"; }
    }, 1000);
}

function resetGame() {
    connections = [null, null, null, null];
    clearInterval(timerInterval);
    generate();
    startTimer();
}

window.addEventListener("resize", resize);
canvas.addEventListener("mousedown", startAction);
window.addEventListener("mousemove", moveAction);
window.addEventListener("mouseup", endAction);
canvas.addEventListener("touchstart", (e) => { e.preventDefault(); startAction(e); }, { passive: false });
canvas.addEventListener("touchmove", (e) => { e.preventDefault(); moveAction(e); }, { passive: false });
canvas.addEventListener("touchend", endAction);

overlay.addEventListener("dblclick", () => {
    overlay.style.display = "none";
    resetGame();
});

resize();
startTimer();
draw();
</script>
</body>
</html>
